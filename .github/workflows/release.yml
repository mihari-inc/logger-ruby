name: Release

on:
  push:
    tags:
      - "v*"

env:
  GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Build gem
        run: gem build mihari-ruby.gemspec

      - name: Push gem
        run: gem push mihari-logger-*.gem
